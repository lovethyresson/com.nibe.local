<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../../assets/pair/pair.css">
</head>
<body>

<p class="detect-status" id="discovery-status"></p>
<div id="pump-list" class="pump-list"></div>
<div class="detect-actions">
    <a href="#" id="refresh" style="display: none" data-i18n="pair.discover.refresh"></a>
</div>

<form class="homey-form">
    <fieldset class="homey-form-fieldset">
        <div class="homey-form-group">
            <label class="homey-form-label" for="ipaddress" data-i18n="pair.discover.manual"></label>
            <div class="input_ip_address">
                <input class="homey-form-input " id="ipaddress" type="text" maxlength="15" value="192.168.1.">
            </div>
        </div>
    </fieldset>

    <button class="homey-button-primary-full"
            id="submit"
            data-i18n="pair.ok"
    ></button>
</form>

<script type="text/javascript">
    Homey.setTitle(Homey.__('pair.title'));

    var statusEl = document.getElementById('discovery-status');
    var listEl = document.getElementById('pump-list');
    var refreshEl = document.getElementById('refresh');

    function proceedWith(ipaddress) {
        Homey.showLoadingOverlay();
        Homey.emit('ip_address_entered', { ipaddress }, (err, result) => {
            Homey.hideLoadingOverlay();
            if (err) {
                Homey.alert(err, 'error', () => {
                });
            } else if (result) {
                // Device creation happens at the end of the features view;
                // next up is feature detection.
                Homey.showView('detect');
            }
        });
    }

    Homey.on('discovery_progress', function (progress) {
        statusEl.textContent = Homey.__('pair.discover.searching')
            + ' (' + Math.round((progress.done / progress.total) * 100) + '%)';
    });

    function renderPumps(pumps) {
        listEl.innerHTML = '';
        pumps.forEach(function (pump) {
            var item = document.createElement('button');
            item.type = 'button';
            item.className = 'pump-item';
            var name = document.createElement('strong');
            name.textContent = Homey.__('pair.discover.pump') + ' — ' + pump.address;
            item.appendChild(name);
            if (typeof pump.outdoorTemperature === 'number') {
                var detail = document.createElement('div');
                detail.className = 'pump-detail';
                detail.textContent = Homey.__('pair.discover.outdoor') + ': ' + pump.outdoorTemperature + ' °C';
                item.appendChild(detail);
            }
            item.onclick = function (e) {
                e.preventDefault();
                proceedWith(pump.address);
            };
            listEl.appendChild(item);
        });
    }

    function discover() {
        refreshEl.style.display = 'none';
        listEl.innerHTML = '';
        statusEl.textContent = Homey.__('pair.discover.searching');
        Homey.emit('discover', {}, function (err, pumps) {
            refreshEl.style.display = 'inline-block';
            if (err || !pumps || !pumps.length) {
                statusEl.textContent = Homey.__('pair.discover.none_found');
                return;
            }
            statusEl.textContent = Homey.__('pair.discover.found');
            renderPumps(pumps);
        });
    }

    refreshEl.onclick = function (e) {
        e.preventDefault();
        discover();
    };

    document.getElementById('submit').onclick = (e) => {
        e.preventDefault();
        proceedWith(document.getElementById("ipaddress").value);
    };

    discover();
</script>
</body>
</html>

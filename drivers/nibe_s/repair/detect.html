<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../../assets/pair/pair.css">
</head>
<body>

<div class="pair-hero">
    <div class="pair-hero-icon"><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="72" r="6" fill="currentColor" stroke="none"/><path d="M31 60a26 26 0 0 1 38 0"/><path d="M18 46a44 44 0 0 1 64 0"/><path d="M6 32a62 62 0 0 1 88 0"/></svg></div>
    <div class="pair-hero-title" data-i18n="pair.detect.title"></div>
    <p class="pair-hero-sub" data-i18n="pair.detect.intro"></p>
</div>

<div class="detect-progress"><div class="detect-bar" id="detect-bar"></div></div>
<p class="detect-status" id="status"></p>
<p class="detect-error" id="error"></p>

<div class="detect-actions">
    <a href="#" id="retry" style="display: none" data-i18n="pair.detect.retry"></a>
    <a href="#" id="skip" data-i18n="pair.detect.skip"></a>
</div>

<script type="text/javascript" src="../../../assets/pair/detect.js"></script>
</body>
</html>

<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <!-- App icon. Homey renders this on the brandColor tile (NIBE red #D81E28), so the
         artwork is white/transparent with no background fill of its own. Wordmark + a
         "LIVE" pill with a green real-time dot = local, live control. Keep in sync with
         brandColor in .homeycompose/app.json. -->
    <text x="100" y="104" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="60" font-weight="800" letter-spacing="1" fill="#ffffff">NIBE</text>
    <rect x="44" y="126" width="112" height="30" rx="15" fill="#ffffff"/>
    <circle cx="72" cy="141" r="5.5" fill="#1FB673"/>
    <text x="112" y="147" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="18" font-weight="800" letter-spacing="3" fill="#D81E28">LIVE</text>
</svg>
